<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK Radar Gorzów - PRO</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --danger: #ef4444;
            --success: #10b981;
            --bg-glass: rgba(255, 255, 255, 0.92);
            --text-dark: #0f172a;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; touch-action: manipulation; margin: 0; padding: 0; }
        
        body, html {
            width: 100vw; height: 100dvh; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; background-color: #f1f5f9;
        }

        /* MAPA */
        #map { position: absolute; top: 0; left: 0; width: 100vw; height: 100dvh; z-index: 1; }

        /* PANEL GŁÓWNY (UI) */
        #ui-panel {
            position: absolute; bottom: 0; left: 0; width: 100vw; height: 42dvh;
            background: var(--bg-glass); backdrop-filter: blur(12px);
            border-radius: 28px 28px 0 0; box-shadow: 0 -8px 30px rgba(0,0,0,0.12);
            z-index: 1000; display: flex; flex-direction: column; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .panel-header {
            padding: 20px; background: var(--primary); color: white;
            border-radius: 28px 28px 0 0; display: flex; justify-content: space-between; align-items: center;
        }
        .panel-header h1 { font-size: 1.25rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .panel-header .badge { background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }

        .instruction-banner {
            background: #eff6ff; color: var(--primary-dark); font-size: 0.85rem; font-weight: 500;
            padding: 12px 20px; text-align: center; border-bottom: 1px solid #dbeafe;
        }

        #events-list { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }
        .empty-state { text-align: center; color: var(--text-muted); font-size: 0.9rem; padding: 30px 20px; }

        /* KARTY ZDARZEŃ */
        .event-card {
            background: white; border: 1px solid #e2e8f0; border-radius: 16px;
            padding: 16px; margin-bottom: 12px; cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); transition: transform 0.2s, box-shadow 0.2s;
        }
        .event-card:active { transform: scale(0.98); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .card-title { font-weight: 700; font-size: 1rem; }
        .card-time { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; }
        .card-location { font-size: 0.875rem; color: var(--text-dark); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .card-score { font-size: 0.75rem; font-weight: 700; display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 8px; }
        .score-positive { background: #dcfce7; color: #166534; }
        .score-negative { background: #fee2e2; color: #991b1b; }

        /* MODAL (Dodawanie zdarzenia) */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh;
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px);
            z-index: 2000; justify-content: center; align-items: center; padding: 16px;
        }
        .modal-content {
            background: white; width: 100%; max-width: 420px; border-radius: 24px;
            padding: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: modalSlideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes modalSlideIn { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal-title { font-size: 1.25rem; font-weight: 800; color: var(--text-dark); margin-bottom: 20px; text-align: center; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
        .input-group input, .input-group select {
            width: 100%; padding: 14px; border: 1.5px solid #cbd5e1; border-radius: 12px;
            font-size: 16px; background: #f8fafc; color: var(--text-dark); transition: border-color 0.2s;
        }
        .input-group input:focus, .input-group select:focus { outline: none; border-color: var(--primary); background: white; }
        
        .modal-buttons { display: flex; gap: 12px; margin-top: 24px; }
        .btn { flex: 1; padding: 14px; border-radius: 12px; font-size: 1rem; font-weight: 700; border: none; cursor: pointer; transition: opacity 0.2s; }
        .btn:active { opacity: 0.8; }
        .btn-cancel { background: #f1f5f9; color: var(--text-muted); }
        .btn-submit { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(37,99,235,0.3); }

        /* MARKERY I DYMKI NA MAPIE */
        .map-marker {
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; background: white; border: 3px solid white;
            box-shadow: 0 6px 16px rgba(0,0,0,0.3); color: white; font-size: 20px;
        }
        .leaflet-popup-content-wrapper { border-radius: 16px; padding: 0; overflow: hidden; }
        .leaflet-popup-content { margin: 0; min-width: 240px; }
        
        .popup-header { padding: 12px 16px; font-weight: 700; font-size: 15px; color: white; }
        .popup-body { padding: 12px 16px; font-size: 13px; color: var(--text-dark); line-height: 1.5; }
        .popup-actions { display: flex; padding: 12px 16px; gap: 10px; background: #f8fafc; border-top: 1px solid #e2e8f0; }
        .vote-btn {
            flex: 1; padding: 10px; border-radius: 10px; border: none; font-weight: 700; font-size: 12px;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            background: white; border: 1px solid #cbd5e1; color: var(--text-dark); cursor: pointer;
        }
        .vote-btn.active-up { background: var(--success); color: white; border-color: var(--success); }
        .vote-btn.active-down { background: var(--danger); color: white; border-color: var(--danger); }

        /* SYSTEM POWIADOMIEŃ (TOAST) */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            background: #1e293b; color: white; padding: 12px 24px; border-radius: 50px;
            font-size: 0.9rem; font-weight: 600; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: toastEnter 0.3s forwards, toastLeave 0.3s forwards 2.7s; opacity: 0;
        }
        @keyframes toastEnter { to { opacity: 1; transform: translateY(10px); } }
        @keyframes toastLeave { to { opacity: 0; transform: translateY(-10px); } }

        /* RESPONSIVE DESKTOP */
        @media (min-width: 768px) {
            #ui-panel { width: 400px; height: 100dvh; border-radius: 0; border-right: 1px solid rgba(0,0,0,0.1); }
            .panel-header { border-radius: 0; }
            L.control.zoom { display: block; }
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="toast-container"></div>

    <div id="ui-panel">
        <div class="panel-header">
            <h1>🚌 MZK Radar</h1>
            <span class="badge">Gorzów & Okolice</span>
        </div>
        <div class="instruction-banner">📍 Kliknij w dowolne miejsce na mapie, by dodać zgłoszenie</div>
        <div id="events-list">
            <div class="empty-state">Ładowanie danych z chmury...</div>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-content">
            <h2 class="modal-title">Nowe Zgłoszenie</h2>
            
            <div class="input-group">
                <label>Rodzaj zdarzenia</label>
                <select id="event-type">
                    <option value="kanar">🎫 Kontrola biletów (Kanar)</option>
                    <option value="awaria">🛠️ Awaria pojazdu</option>
                    <option value="opoznienie">⏳ Opóźnienie / Korek</option>
                    <option value="inne">⚠️ Inne utrudnienie</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>Linia (np. 104, 126, T1)</label>
                <input type="text" id="event-line" placeholder="Wpisz numer linii..." autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>Przystanek / Kierunek</label>
                <input type="text" id="event-location" placeholder="np. Kłodawa Szkoła..." autocomplete="off">
            </div>

            <div class="modal-buttons">
                <button type="button" class="btn btn-cancel" id="btn-cancel">Anuluj</button>
                <button type="button" class="btn btn-submit" id="btn-submit">Dodaj do radaru</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Zaktualizowana, pełna konfiguracja z Twoim adresem URL chmury
        const firebaseConfig = {
            apiKey: "AIzaSyBDA0kFNmO3O0L57M1V7x4FFImpS8IpNC0",
            authDomain: "radar-585fa.firebaseapp.com",
            databaseURL: "https://radar-585fa-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "radar-585fa",
            storageBucket: "radar-585fa.firebasestorage.app",
            messagingSenderId: "273151127719",
            appId: "1:273151127719:web:0f4477fafe77248e312b82"
        };

        // Typy zdarzeń z kolorami
        const EVENT_CONFIG = {
            kanar: { label: '🎫 Kanar', color: '#ef4444' },
            awaria: { label: '🛠️ Awaria', color: '#7f1d1d' },
            opoznienie: { label: '⏳ Opóźnienie', color: '#f59e0b' },
            inne: { label: '⚠️ Inne', color: '#2563eb' }
        };

        let db, reportsRef;
        let reports = {};
        let leafletMarkers = {};
        let tempCoords = null;

        // Inicjalizacja Mapy (centrowanie na Gorzów)
        const map = L.map('map', { zoomControl: false }).setView([52.7367, 15.2288], 13);
        L.control.zoom({ position: 'topright' }).addTo(map);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

        // Funkcja Powiadomień (Toast)
        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Inicjalizacja Firebase
        try {
            const app = initializeApp(firebaseConfig);
            db = getDatabase(app);
            reportsRef = ref(db, 'reports');
            showToast("✅ Połączono z radarem w chmurze");
        } catch (error) {
            console.error("Błąd Firebase:", error);
            showToast("❌ Błąd połączenia z siecią!");
        }

        const modal = document.getElementById('modalOverlay');
        const btnCancel = document.getElementById('btn-cancel');
        const btnSubmit = document.getElementById('btn-submit');
        
        // Wykrywanie kliknięcia na mapie
        map.on('click', (e) => {
            tempCoords = e.latlng;
            document.getElementById('event-line').value = '';
            document.getElementById('event-location').value = '';
            modal.style.display = 'flex';
        });

        // Zamknięcie formularza
        btnCancel.addEventListener('click', () => {
            modal.style.display = 'none';
            tempCoords = null;
        });

        // Wysłanie danych do Twojego Firebase
        btnSubmit.addEventListener('click', () => {
            if (!tempCoords) return;

            const type = document.getElementById('event-type').value;
            const line = document.getElementById('event-line').value.trim() || 'Nieznana';
            const location = document.getElementById('event-location').value.trim() || 'Brak danych';
            const time = new Date().toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });

            btnSubmit.disabled = true;
            btnSubmit.textContent = "Wysyłanie...";

            const newReportRef = push(reportsRef);
            const reportId = newReportRef.key;

            const newReport = {
                id: reportId,
                lat: tempCoords.lat,
                lng: tempCoords.lng,
                type: type,
                line: line,
                location: location,
                confirms: 1,
                denies: 0,
                time: time
            };

            set(newReportRef, newReport).then(() => {
                localStorage.setItem(`vote_${reportId}`, 'up');
                modal.style.display = 'none';
                showToast("📍 Dodano nowe utrudnienie!");
                map.panTo([tempCoords.lat - 0.003, tempCoords.lng]);
            }).catch(error => {
                console.error("Błąd zapisu Firebase:", error);
                showToast("❌ Błąd zapisu! Sprawdź reguły Rules w Firebase.");
            }).finally(() => {
                btnSubmit.disabled = false;
                btnSubmit.textContent = "Dodaj do radaru";
                tempCoords = null;
            });
        });

        // Aktualizacja w czasie rzeczywistym u wszystkich użytkowników na raz
        onValue(reportsRef, (snapshot) => {
            reports = snapshot.val() || {};
            renderUI();
        }, (error) => {
            console.error("Błąd odczytu bazy:", error);
            document.getElementById('events-list').innerHTML = '<div class="empty-state">❌ Odmowa dostępu. Upewnij się, że w zakładce Rules (w Realtime Database) masz ustawione true!</div>';
        });

        // Obsługa weryfikacji zgłoszeń (Upvote/Downvote)
        window.handleVote = function(e, id, voteType) {
            e.preventDefault();
            e.stopPropagation();

            const report = reports[id];
            if (!report) return;

            const storageKey = `vote_${id}`;
            const previousVote = localStorage.getItem(storageKey);

            let newConfirms = report.confirms || 0;
            let newDenies = report.denies || 0;

            if (previousVote === voteType) {
                if (voteType === 'up') newConfirms--;
                if (voteType === 'down') newDenies--;
                localStorage.removeItem(storageKey);
            } else {
                if (previousVote === 'up') newConfirms--;
                if (previousVote === 'down') newDenies--;
                if (voteType === 'up') newConfirms++;
                if (voteType === 'down') newDenies++;
                localStorage.setItem(storageKey, voteType);
            }

            // Jeśli zgłoszenie jest fałszywe (bilans ujemny o 3 punkty) -> usuń z chmury
            if (newDenies - newConfirms >= 3) {
                remove(ref(db, `reports/${id}`)).then(() => {
                    localStorage.removeItem(storageKey);
                    showToast("🗑️ Usunięto nieaktualne zgłoszenie");
                });
            } else {
                update(ref(db, `reports/${id}`), { confirms: newConfirms, denies: newDenies });
            }
        };

        // Rysowanie UI oraz synchronizacja pinezek na mapie
        function renderUI() {
            const listContainer = document.getElementById('events-list');
            listContainer.innerHTML = '';

            // Wyczyszczenie starych markerów
            for (let id in leafletMarkers) {
                if (!reports[id]) {
                    map.removeLayer(leafletMarkers[id]);
                    delete leafletMarkers[id];
                }
            }

            const reportsArray = Object.values(reports);
            
            if (reportsArray.length === 0) {
                listContainer.innerHTML = '<div class="empty-state">✅ Wszystkie drogi czyste. Brak aktywnych utrudnień.</div>';
                return;
            }

            // Sortowanie: Najbardziej wiarygodne na samej górze panelu
            reportsArray.sort((a,b) => ((b.confirms || 0) - (b.denies || 0)) - ((a.confirms || 0) - (a.denies || 0)));

            reportsArray.forEach(report => {
                const config = EVENT_CONFIG[report.type];
                const score = (report.confirms || 0) - (report.denies || 0);
                const userVote = localStorage.getItem(`vote_${report.id}`);
                const isPositive = score >= 0;

                // Dodawanie karty do wysuwanego panelu
                const card = document.createElement('div');
                card.className = 'event-card';
                card.onclick = () => {
                    map.setView([report.lat - 0.003, report.lng], 15);
                    if (leafletMarkers[report.id]) leafletMarkers[report.id].openPopup();
                };
                
                card.innerHTML = `
                    <div class="card-header">
                        <span class="card-title" style="color: ${config.color}">${config.label} (${report.line})</span>
                        <span class="card-time">${report.time}</span>
                    </div>
                    <div class="card-location">📍 ${report.location}</div>
                    <div class="card-score ${isPositive ? 'score-positive' : 'score-negative'}">
                        ${isPositive ? '👍' : '👎'} Wiarygodność: ${score} pkt
                    </div>
                `;
                listContainer.appendChild(card);

                const activeUpClass = userVote === 'up' ? 'active-up' : '';
                const activeDownClass = userVote === 'down' ? 'active-down' : '';

                // Konstruowanie dymka (Popupu) nad markerem
                const popupHtml = `
                    <div class="popup-header" style="background-color: ${config.color}">
                        ${config.label} - Linia ${report.line}
                    </div>
                    <div class="popup-body">
                        <strong>📍 Miejsce:</strong> ${report.location}<br>
                        <strong>🕒 Godzina:</strong> ${report.time}<br>
                    </div>
                    <div class="popup-actions">
                        <button type="button" class="vote-btn ${activeUpClass}" onmousedown="handleVote(event, '${report.id}', 'up')" ontouchstart="handleVote(event, '${report.id}', 'up')">
                            👍 Potwierdzam
                        </button>
                        <button type="button" class="vote-btn ${activeDownClass}" onmousedown="handleVote(event, '${report.id}', 'down')" ontouchstart="handleVote(event, '${report.id}', 'down')">
                            👎 Nie ma / Ściema
                        </button>
                    </div>
                `;

                const customIcon = L.divIcon({
                    className: 'map-marker',
                    html: `<div style="background-color:${config.color}; width:100%; height:100%; border-radius:50%; display:flex; align-items:center; justify-content:center;">${config.label.split(' ')[0]}</div>`,
                    iconSize: [44, 44],
                    iconAnchor: [22, 22],
                    popupAnchor: [0, -20]
                });

                if (leafletMarkers[report.id]) {
                    leafletMarkers[report.id].setPopupContent(popupHtml);
                } else {
                    const marker = L.marker([report.lat, report.lng], { icon: customIcon })
                        .addTo(map)
                        .bindPopup(popupHtml);
                    leafletMarkers[report.id] = marker;
                }
            });
        }
    </script>
</body>
</html>
