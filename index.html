
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kanarek</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <style>
        :root {
            /* Główny motyw czerwony */
            --primary: #dc2626;         /* Czerwień (Red 600) */
            --primary-dark: #b91c1c;    /* Ciemna czerwień (Red 700) */
            --primary-light: #fee2e2;   /* Jasne czerwone tło */
            
            --danger: #ef4444;          
            --success: #059669;
            
            /* Kolory Trybu Jasnego */
            --bg-solid: #f1f5f9;        /* Tło aplikacji (Slate 100) */
            --bg-panel: #ffffff;        /* Tło kart i paneli (White) */
            --border-color: #cbd5e1;    /* Ramki (Slate 300) */
            --text-dark: #0f172a;       /* Tekst główny (Slate 900) */
            --text-muted: #64748b;      /* Tekst poboczny (Slate 500) */
            --radius-md: 12px;
        }

        * { box-sizing: border-box; touch-action: manipulation; margin: 0; padding: 0; }
        
        body, html {
            width: 100vw; height: 100dvh; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden; background-color: var(--bg-solid); 
            color: var(--text-dark);
        }

        .icon-sm { font-size: 18px !important; vertical-align: text-bottom; }
        .icon-md { font-size: 24px !important; vertical-align: middle; }
        .icon-lg { font-size: 28px !important; vertical-align: middle; }
        .icon-text-gap { display: inline-flex; align-items: center; gap: 6px; }

        /* JASNY EKRAN STARTOWY */
        #city-selector-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh;
            background: rgba(241, 245, 249, 0.95); backdrop-filter: blur(8px);
            z-index: 9999; display: flex; justify-content: center; align-items: center;
            padding: 20px; transition: opacity 0.3s ease;
        }
        .city-card {
            background: var(--bg-panel); width: 100%; max-width: 450px; border-radius: var(--radius-md);
            padding: 30px 24px; border: 2px solid var(--primary); box-shadow: 0 10px 25px rgba(220, 38, 38, 0.15);
            text-align: center;
        }
        .city-card h1 { font-size: 1.5rem; margin-bottom: 8px; display: flex; justify-content: center; align-items: center; gap: 8px; color: var(--primary); }
        .city-card p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 24px; }
        .city-list { display: flex; flex-direction: column; gap: 12px; }
        .city-btn {
            background: var(--bg-solid); border: 2px solid var(--border-color); color: var(--text-dark);
            padding: 16px; border-radius: var(--radius-md); font-size: 1rem; font-weight: 800;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            transition: all 0.2s;
        }
        .city-btn.active { border-color: var(--primary); background: var(--primary-light); color: var(--primary-dark); }
        .city-btn.disabled { opacity: 0.5; cursor: not-allowed; border-style: dashed; }
        .city-btn.disabled .badge { background: var(--border-color); color: var(--text-muted); padding: 4px 8px; border-radius: 6px; font-size: 10px; }

        /* MAPA */
        #map { position: absolute; top: 0; left: 0; width: 100vw; height: 100dvh; z-index: 1; background: #e2e8f0; }
        .map-crosshair { cursor: crosshair !important; }

        /* MINIMALISTYCZNY PANEL DOLNY */
        #ui-panel {
            position: absolute; bottom: 0; left: 0; width: 100vw; height: auto;
            background: var(--bg-panel); border-top: 3px solid var(--primary);
            z-index: 1000; display: flex; flex-direction: column;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.05); padding-bottom: max(env(safe-area-inset-bottom), 16px);
        }

        .panel-header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
        .panel-header h1 { font-size: 1.15rem; font-weight: 900; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        .panel-header .badge { background: var(--primary-light); color: var(--primary-dark); padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 800; }
        
        /* PRZYCISK WYCISZANIA */
        .btn-icon { background: none; border: none; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center; padding: 6px; border-radius: 50%; transition: 0.2s; }
        .btn-icon:hover, .btn-icon:active { color: var(--primary); background: var(--primary-light); }

        /* CZERWONY FAB */
        #fab-add {
            position: absolute; bottom: 90px; right: 20px;
            width: 60px; height: 60px; border-radius: 50%;
            background: var(--primary); color: white;
            border: none; box-shadow: 0 6px 16px rgba(220, 38, 38, 0.4);
            z-index: 1001; cursor: pointer; display: flex; justify-content: center; align-items: center;
        }
        #fab-add:active { transform: scale(0.95); background: var(--primary-dark); }
        
        /* BANER INSTRUKCYJNY */
        #instruction-banner {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: var(--primary); color: white; padding: 12px 24px;
            border-radius: 30px; font-weight: 700; font-size: 0.95rem; border: 2px solid var(--primary-dark);
            box-shadow: 0 6px 16px rgba(220, 38, 38, 0.3);
            z-index: 1001; opacity: 0; pointer-events: none;
            display: flex; align-items: center; gap: 8px; white-space: nowrap; transition: transform 0.2s, opacity 0.2s;
        }
        #instruction-banner.active { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* JASNY MODAL ZGŁOSZENIA */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh;
            background: rgba(15, 23, 42, 0.7); z-index: 2000; justify-content: center; align-items: flex-end; padding: 0;
        }
        .modal-content {
            background: var(--bg-panel); width: 100%; max-width: 500px; border-top: 4px solid var(--primary);
            padding: 24px; border-radius: 20px 20px 0 0;
        }
        .modal-title { font-size: 1.25rem; font-weight: 900; margin-bottom: 20px; color: var(--primary); text-align: center; }
        
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.8rem; font-weight: 800; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-group input, .input-group select {
            width: 100%; padding: 14px; border: 2px solid var(--border-color); border-radius: var(--radius-md);
            font-size: 1rem; background: var(--bg-panel); color: var(--text-dark); font-weight: 700;
        }
        .input-group input:focus, .input-group select:focus { outline: none; border-color: var(--primary); background: var(--primary-light); }
        .input-group select:disabled { opacity: 0.5; background: var(--bg-solid); cursor: not-allowed; }
        .input-group select.error { border-color: var(--primary); }
        
        .modal-buttons { display: flex; gap: 12px; margin-top: 24px; }
        .btn { flex: 1; padding: 14px; border-radius: var(--radius-md); font-weight: 800; border: none; cursor: pointer; font-size: 1rem; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; background: var(--border-color) !important; color: var(--text-muted) !important; border: none !important; }
        .btn-cancel { background: var(--bg-solid); color: var(--text-dark); border: 2px solid var(--border-color); }
        .btn-submit { background: var(--primary); color: white; border: 2px solid var(--primary-dark); }

        /* JASNE MARKERY I DYMKI (Popup) */
        .map-marker {
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; color: white; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .map-marker.faded { opacity: 0.6; filter: grayscale(80%); }
        .leaflet-popup-content-wrapper { background: var(--bg-panel); border-radius: var(--radius-md); padding: 0; overflow: hidden; border: 1px solid var(--border-color); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .leaflet-popup-content { margin: 0; min-width: 260px; }
        .leaflet-popup-tip { background: var(--bg-panel); border: 1px solid var(--border-color); border-top: none; border-left: none; }
        
        .popup-header { padding: 12px 16px; font-weight: 900; font-size: 15px; color: white; display: flex; align-items: center; gap: 6px; justify-content: space-between;}
        .popup-body { padding: 14px 16px; font-size: 14px; color: var(--text-dark); line-height: 1.6; font-weight: 600; }
        .popup-actions { display: flex; padding: 12px; gap: 12px; background: var(--bg-solid); border-top: 1px solid var(--border-color); justify-content: center; }
        
        .card-time .fresh { color: var(--success); }
        .card-time .old { color: var(--danger); }

        /* PRZYCISKI GŁOSOWANIA (Tylko Ikony) */
        .vote-btn {
            flex: 1; padding: 12px; border-radius: var(--radius-md); border: 2px solid var(--border-color);
            background: var(--bg-panel); color: var(--text-muted); cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 4px; transition: all 0.2s;
        }
        .vote-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .vote-btn:active:not(:disabled) { transform: scale(0.95); }
        .vote-btn.active-up { background: #d1fae5; color: #047857; border-color: #10b981; }
        .vote-btn.active-down { background: var(--primary-light); color: var(--primary-dark); border-color: var(--primary); }
        
        .deny-counter { font-size: 14px; font-weight: 900; margin-left: 6px; }

        /* CZERWONY TOAST */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--primary); color: white; padding: 14px 28px; border-radius: 30px; font-size: 0.95rem; font-weight: 800; border: 2px solid var(--primary-dark); box-shadow: 0 6px 20px rgba(220, 38, 38, 0.4); animation: toastEnter 0.2s forwards, toastLeave 0.2s forwards 3.5s; opacity: 0; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        @keyframes toastEnter { to { opacity: 1; transform: translateY(10px); } }
        @keyframes toastLeave { to { opacity: 0; transform: translateY(-10px); } }

        @media (min-width: 768px) {
            .modal-content { border-radius: var(--radius-md); margin-bottom: 50px; border: 2px solid var(--primary); }
            .modal-overlay { align-items: center; }
            L.control.zoom { display: block; }
        }
    </style>
</head>
<body>

    <audio id="sound-confirm" src="potwierdzono.mp3" preload="auto"></audio>
    <audio id="sound-cancel" src="odwolano.mp3" preload="auto"></audio>
    <audio id="sound-notify" src="dodano.mp3" preload="auto"></audio>

    <div id="city-selector-overlay">
        <div class="city-card">
            <h1><span class="material-symbols-outlined icon-lg">radar</span> Kanarek</h1>
            <p>Wybierz miasto, aby kontynuować</p>
            <div class="city-list">
                <button class="city-btn active" id="btn-select-gorzow">
                    <span class="icon-text-gap"><span class="material-symbols-outlined icon-md">location_city</span> Gorzów Wlkp.</span>
                    <span class="material-symbols-outlined icon-md">chevron_right</span>
                </button>
                <button class="city-btn disabled">
                    <span class="icon-text-gap"><span class="material-symbols-outlined icon-md">map</span> Szczecin</span>

                </button>
                <button class="city-btn disabled">

                    <span class="badge">Wkrótce</span>
                </button>
            </div>
        </div>
    </div>

    <div id="app-container" style="display: none;">
        <div id="map"></div>
        <div id="toast-container"></div>
        
        <div id="instruction-banner">
            <span class="material-symbols-outlined icon-md">location_on</span> Wskaż miejsce na mapie
        </div>
        
        <button id="fab-add">
            <span class="material-symbols-outlined icon-lg" id="fab-icon">add</span>
        </button>

        <div id="ui-panel">
            <div class="panel-header">
                <h1><span class="material-symbols-outlined icon-lg">directions_bus</span> Kanarek</h1>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <button id="btn-mute" class="btn-icon" title="Wycisz dźwięki">
                        <span class="material-symbols-outlined icon-md" id="mute-icon">volume_up</span>
                    </button>
                    <span class="badge">Gorzów Wlkp.</span>
                </div>
            </div>
        </div>

        <div id="modalOverlay" class="modal-overlay">
            <div class="modal-content">
                <h2 class="modal-title">Zgłoś Utrudnienie</h2>
                
                <div class="input-group">
                    <label>Rodzaj</label>
                    <select id="event-type">
                        <option value="kanar">Kontrola biletów (Kanar)</option>
                        <option value="awaria">Awaria pojazdu</option>
                        <option value="opoznienie">Opóźnienie / Korek</option>
                        <option value="inne">Inne utrudnienie</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label>Linia <span style="color:var(--primary)">*</span></label>
                    <select id="event-line">
                        <option value="" disabled selected>Wybierz linię...</option>
                        </select>
                </div>
                
                <div class="input-group">
                    <label>Kierunek <span style="color:var(--primary)">*</span></label>
                    <select id="event-direction" disabled>
                        <option value="" disabled selected>Najpierw wybierz linię...</option>
                        </select>
                </div>

                <div class="modal-buttons">
                    <button type="button" class="btn btn-cancel" id="btn-cancel">Anuluj</button>
                    <button type="button" class="btn btn-submit" id="btn-submit" disabled>Wyślij</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBDA0kFNmO3O0L57M1V7x4FFImpS8IpNC0",
            authDomain: "radar-585fa.firebaseapp.com",
            databaseURL: "https://radar-585fa-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "radar-585fa",
            storageBucket: "radar-585fa.firebasestorage.app",
            messagingSenderId: "273151127719",
            appId: "1:273151127719:web:0f4477fafe77248e312b82"
        };

        const EVENT_CONFIG = {
            kanar: { label: 'Kanar', color: '#dc2626', icon: 'confirmation_number' },
            awaria: { label: 'Awaria', color: '#7f1d1d', icon: 'build' },
            opoznienie: { label: 'Korek', color: '#d97706', icon: 'schedule' },
            inne: { label: 'Inne', color: '#1d4ed8', icon: 'warning' }
        };

        // DANE DLA LINII I KIERUNKÓW
        const LINES_DATA = {
            "1": ["Fieldorfa-\"Nila\"", "Wieprzyce PKP"],
            "2": ["Piaski", "Wieprzyce PKP"],
            "3": ["Piaski", "Fieldorfa-\"Nila\""],
            "4": ["Fieldorfa Nila", "Dworzec Główny"],
            "100": ["Siedlce Ujęcie Wody", "Oś. Staszica", "TPV"],
            "101": ["Londyńska", "Śląska Pole Golfowe"],
            "102": ["Śląska Pole Golfowe", "Dekerta-Szpital"],
            "103": ["Słowiańska", "Strażacka", "TPV"],
            "104": ["Bora-Komorowskiego", "TPV", "Słowiańska"],
            "105": ["Oś. Staszica", "Cmentarz Brama II"],
            "106": ["Odlewników", "AWF"],
            "107": ["Drozdowa Ogrody Działkowe", "Działkowców-Pętla"],
            "108": ["Strażacka", "Oś. Staszica"],
            "109": ["Londyńska", "Fieldorfa-\"Nila\""],
            "110": ["Drozdowa Ogrody Działkowe", "Oś. Staszica"],
            "111": ["Śląska Pole Golfowe", "Cmentarz Brama II", "Chwalęcice Kościelna"],
            "112": ["Oś. Staszica", "Łagodzin"],
            "113": ["Wawrów Stadion", "Oś. Staszica", "TPV"],
            "114": ["Rondo Sybiraków", "Bora-Komorowskiego"],
            "115": ["Piaski", "Londyńska"],
            "116": ["Strażacka", "Oś. Staszica"],
            "117": ["AWF", "Chróścik"],
            "119": ["Zajezdnia Kostrzyńska", "Chróścik", "Chróścik Inneko"],
            "120": ["Odlewników", "AWF"],
            "121": ["TPV", "Śląska Pole Golfowe"],
            "122": ["Janice", "Czechów", "Czechów SARRIS DAM", "Oś. Staszica"],
            "123": ["Bora-Komorowskiego", "TPV"],
            "124": ["Oś. Staszica", "Jedwabnicza Park Handlowy", "Prefadom"],
            "125": ["Śląska Pole Golfowe", "Dekerta-Szpital"],
            "126": ["Oś. Staszica", "Dekerta-Szpital"],
            "127": ["Oś. Staszica", "Łagodzin", "Kasprzaka Terminal"],
            "128": ["Piaski", "Jedwabnicza Park nie"],
            "130": ["Stanowice", "AWF", "Baczyna"],
            "131": ["Stanowice", "AWF", "Baczyna"],
            "132": ["Bora-Komorowskiego", "Cmentarz Brama II"],
            "134": ["Dekerta-Szpital", "Strażacka"],
            "135": ["Małyszyńska", "Dekerta-Szpital"],
            "136": ["Małyszyńska", "Śląska Pole Golfowe"],
            "401": ["Zajezdnia Kostrzyńska", "Śląska Pole Golfowe"],
            "402": ["Zajezdnia Kostrzyńska", "Oś. Staszica"],
            "510": ["Zajezdnia Kostrzyńska"],
            "511": ["Zajezdnia Kostrzyńska"],
            "512": ["Zajezdnia Kostrzyńska"],
            "201": ["Jezioro Nierzym", "Londyńska"]
        };

        const ALLOWED_BOUNDS = L.latLngBounds([52.6500, 15.0000], [52.8200, 15.4200]);
        const FADE_THRESHOLD_MS = 15 * 60 * 1000;
        const DELETE_THRESHOLD_MS = 25 * 60 * 1000;

        let db, reportsRef;
        let reports = {};
        let leafletMarkers = {};
        let tempCoords = null;
        let isAddingMode = false;
        let map;

        // ZMIENNE DO DŹWIĘKÓW
        let isMuted = false;
        const btnMute = document.getElementById('btn-mute');
        const muteIcon = document.getElementById('mute-icon');

        // Obsługa wyciszania
        btnMute.addEventListener('click', () => {
            isMuted = !isMuted;
            muteIcon.textContent = isMuted ? 'volume_off' : 'volume_up';
            if (isMuted) {
                showToast("volume_off", "Dźwięki wyciszone");
            } else {
                showToast("volume_up", "Dźwięki włączone");
            }
        });

        // Bezpieczna funkcja odtwarzająca dźwięk
        function playSound(audioId) {
            if (isMuted) return;
            const audio = document.getElementById(audioId);
            if (audio) {
                audio.currentTime = 0; // Przewiń do początku, jeśli grał
                audio.play().catch(e => console.log("Zablokowano autoodtwarzanie dźwięku"));
            }
        }

        function showToast(icon, message, isError = false) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            if(isError) {
                toast.style.background = '#0f172a';
                toast.style.borderColor = '#000000';
            }
            toast.innerHTML = `<span class="material-symbols-outlined icon-md">${icon}</span> ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function getTimeAgo(timestamp) {
            const diffMs = Date.now() - timestamp;
            const diffMins = Math.floor(diffMs / 60000);
            
            if (diffMins < 1) return "przed chwilą";
            if (diffMins === 1) return "1 min. temu";
            return `${diffMins} min. temu`;
        }

        document.getElementById('btn-select-gorzow').addEventListener('click', () => {
            document.getElementById('city-selector-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('city-selector-overlay').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                initRadar();
            }, 300);
        });

        function initRadar() {
            map = L.map('map', { 
                zoomControl: false, maxBounds: ALLOWED_BOUNDS, maxBoundsViscosity: 1.0, minZoom: 11
            }).setView([52.7367, 15.2288], 13);
            
            L.control.zoom({ position: 'topright' }).addTo(map);
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { 
                maxZoom: 19, attribution: '&copy; OpenStreetMap &copy; CARTO'
            }).addTo(map);

            try {
                const app = initializeApp(firebaseConfig);
                db = getDatabase(app);
                reportsRef = ref(db, 'reports');
                
                onValue(reportsRef, (snapshot) => {
                    reports = snapshot.val() || {};
                    renderUI();
                });
                
                setInterval(() => {
                    if(Object.keys(reports).length > 0) renderUI();
                }, 15000); 

            } catch (error) {
                showToast("wifi_off", "Brak połączenia", true);
            }

            setupMapEvents();
            setupFormSelects();
        }

        const modal = document.getElementById('modalOverlay');
        const fabAdd = document.getElementById('fab-add');
        const fabIcon = document.getElementById('fab-icon');
        const banner = document.getElementById('instruction-banner');
        const inputLine = document.getElementById('event-line');
        const inputDir = document.getElementById('event-direction');
        const btnSubmit = document.getElementById('btn-submit');

        // Funkcja inicjująca listy rozwijane linii i kierunków
        function setupFormSelects() {
            // Sortowanie linii - numeryczne
            const sortedLines = Object.keys(LINES_DATA).sort((a, b) => parseInt(a) - parseInt(b));
            
            sortedLines.forEach(line => {
                let opt = document.createElement('option');
                opt.value = line;
                opt.textContent = `Linia ${line}`;
                inputLine.appendChild(opt);
            });

            // Reagowanie na zmianę linii
            inputLine.addEventListener('change', () => {
                inputLine.classList.remove('error');
                const selectedLine = inputLine.value;
                
                // Resetowanie listy kierunków
                inputDir.innerHTML = '<option value="" disabled selected>Wybierz kierunek...</option>';
                
                if (selectedLine && LINES_DATA[selectedLine]) {
                    inputDir.disabled = false;
                    LINES_DATA[selectedLine].forEach(dir => {
                        let opt = document.createElement('option');
                        opt.value = dir;
                        opt.textContent = dir;
                        inputDir.appendChild(opt);
                    });
                } else {
                    inputDir.disabled = true;
                }
                validateFormLive();
            });

            inputDir.addEventListener('change', () => {
                inputDir.classList.remove('error');
                validateFormLive();
            });
        }

        function validateFormLive() {
            if (inputLine.value && inputDir.value) {
                btnSubmit.disabled = false;
            } else {
                btnSubmit.disabled = true;
            }
        }

        function setupMapEvents() {
            fabAdd.addEventListener('click', () => {
                isAddingMode = !isAddingMode;
                if (isAddingMode) {
                    document.getElementById('map').classList.add('map-crosshair');
                    banner.classList.add('active');
                    fabAdd.style.background = '#0f172a';
                    fabIcon.textContent = 'close';
                } else {
                    exitAddingMode();
                }
            });

            map.on('click', (e) => {
                if (!isAddingMode) return;
                
                if (!ALLOWED_BOUNDS.contains(e.latlng)) {
                    showToast("block", "Poza strefą operacyjną!", true);
                    exitAddingMode();
                    return;
                }
                
                tempCoords = e.latlng;
                
                // Reset formularza po otwarciu
                inputLine.value = ''; inputLine.classList.remove('error');
                inputDir.innerHTML = '<option value="" disabled selected>Najpierw wybierz linię...</option>';
                inputDir.disabled = true; inputDir.classList.remove('error');
                btnSubmit.disabled = true; 
                
                modal.style.display = 'flex';
                exitAddingMode();
            });
        }

        function exitAddingMode() {
            isAddingMode = false;
            document.getElementById('map').classList.remove('map-crosshair');
            banner.classList.remove('active');
            fabAdd.style.background = 'var(--primary)';
            fabIcon.textContent = 'add';
        }

        document.getElementById('btn-cancel').addEventListener('click', () => {
            modal.style.display = 'none'; tempCoords = null;
        });

        btnSubmit.addEventListener('click', () => {
            if (!tempCoords) return;

            const type = document.getElementById('event-type').value;
            const line = inputLine.value;
            const direction = inputDir.value;
            
            let isValid = true;
            if(!line) { inputLine.classList.add('error'); isValid = false; }
            if(!direction) { inputDir.classList.add('error'); isValid = false; }
            if(!isValid) return;

            const nowTimestamp = Date.now();

            btnSubmit.disabled = true;
            btnSubmit.textContent = "Wysyłanie...";

            const newReportRef = push(reportsRef);
            
            set(newReportRef, {
                id: newReportRef.key,
                lat: tempCoords.lat, lng: tempCoords.lng,
                type, line, location: direction,
                createdAt: nowTimestamp,     
                lastActivity: nowTimestamp,  
                confirms: 1, denies: 0
            }).then(() => {
                localStorage.setItem(`vote_${newReportRef.key}`, 'up');
                modal.style.display = 'none';
                showToast("done", "Zgłoszono poprawnie");
                map.panTo([tempCoords.lat - 0.003, tempCoords.lng]);
                
                // Odtworzenie dźwięku zgłoszenia (dodano.mp3)
                playSound('sound-notify');
                
            }).catch(() => {
                showToast("error", "Błąd zapisu", true);
            }).finally(() => {
                btnSubmit.textContent = "Wyślij";
                tempCoords = null;
            });
        });

        let isVoting = false;
        
        document.addEventListener('click', (e) => {
            const btn = e.target.closest('.vote-btn');
            if (!btn || isVoting) return;
            
            const id = btn.dataset.id;
            const voteType = btn.dataset.vote;
            const report = reports[id];
            if (!report) return;

            isVoting = true;
            const storageKey = `vote_${id}`;
            const previousVote = localStorage.getItem(storageKey);

            let newConfirms = report.confirms || 0;
            let newDenies = report.denies || 0;
            
            let updatedLastActivity = report.lastActivity || report.lastConfirmed || Date.now();

            if (previousVote === voteType) {
                if (voteType === 'up') newConfirms--;
                if (voteType === 'down') newDenies--;
                localStorage.removeItem(storageKey);
            } else {
                if (previousVote === 'up') newConfirms--;
                if (previousVote === 'down') newDenies--;
                
                if (voteType === 'up') { newConfirms++; }
                if (voteType === 'down') { newDenies++; }
                
                updatedLastActivity = Date.now();
                localStorage.setItem(storageKey, voteType);
            }

            if (newDenies >= 3) {
                remove(ref(db, `reports/${id}`)).then(() => {
                    localStorage.removeItem(storageKey);
                    showToast("delete", "Usunięto (3 odrzucenia)");
                    
                    // Odtworzenie dźwięku odwołania przy pełnym usunięciu
                    playSound('sound-cancel');
                    
                }).finally(() => { isVoting = false; });
            } else {
                update(ref(db, `reports/${id}`), { confirms: newConfirms, denies: newDenies, lastActivity: updatedLastActivity })
                .then(() => {
                    if (previousVote !== voteType) {
                        showToast("update", "Zaktualizowano zgłoszenie");
                        
                        // Odtworzenie dźwięku zależnie od klikniętego przycisku (za każdym razem)
                        if (voteType === 'up') {
                            playSound('sound-confirm');
                        } else if (voteType === 'down') {
                            playSound('sound-cancel');
                        }
                    }
                }).finally(() => { isVoting = false; });
            }
        });

        function renderUI() {
            const now = Date.now();

            for (let id in leafletMarkers) {
                if (!reports[id]) {
                    map.removeLayer(leafletMarkers[id]);
                    delete leafletMarkers[id];
                }
            }

            const reportsArray = Object.values(reports);
            if (reportsArray.length === 0) return;

            reportsArray.forEach(report => {
                const createdTime = report.createdAt || report.lastConfirmed || now;
                const lastActivityTime = report.lastActivity || report.lastConfirmed || now;
                
                const ageMs = now - lastActivityTime;
                
                if (ageMs > DELETE_THRESHOLD_MS) {
                    remove(ref(db, `reports/${report.id}`));
                    return; 
                }
                
                const isFaded = ageMs > FADE_THRESHOLD_MS;
                const fadeClass = isFaded ? 'faded' : '';
                
                const relativeCreatedStr = getTimeAgo(createdTime);
                const relativeActivityStr = getTimeAgo(lastActivityTime);
                const timeStatusClass = isFaded ? 'old' : 'fresh';

                const config = EVENT_CONFIG[report.type];
                const userVote = localStorage.getItem(`vote_${report.id}`);
                const deniesCount = report.denies || 0;
                const confirmsCount = report.confirms || 0;

                const popupHtml = `
                    <div class="popup-header" style="background-color: ${config.color}">
                        <span class="icon-text-gap">
                            <span class="material-symbols-outlined icon-sm">${config.icon}</span>
                            ${config.label} (${report.line})
                        </span>
                    </div>
                    <div class="popup-body">
                        <div class="icon-text-gap" style="margin-bottom: 8px;">
                            <span class="material-symbols-outlined icon-sm">signpost</span> 
                            <strong>Kierunek:</strong> ${report.location}
                        </div>
                        <div style="font-size: 12px; color: var(--text-muted); display:flex; justify-content: space-between;">
                            <span>Dodano: ${relativeCreatedStr}</span>
                            <span class="card-time"><span class="${timeStatusClass}" style="font-weight: 800;">Aktywność: ${relativeActivityStr}</span></span>
                        </div>
                        
                        <div style="display: flex; gap: 16px; margin-top: 12px; justify-content: center;">
                            <span class="icon-text-gap" style="color: var(--success); font-weight: 800; font-size: 0.9rem;">
                                <span class="material-symbols-outlined icon-sm">thumb_up</span> ${confirmsCount}
                            </span>
                            <span class="icon-text-gap" style="color: var(--danger); font-weight: 800; font-size: 0.9rem;">
                                <span class="material-symbols-outlined icon-sm">thumb_down</span> ${deniesCount}/3
                            </span>
                        </div>
                    </div>
                    <div class="popup-actions">
                        <button class="vote-btn ${userVote === 'up' ? 'active-up' : ''}" data-id="${report.id}" data-vote="up" title="Potwierdzam">
                            <span class="material-symbols-outlined icon-lg">thumb_up</span>
                        </button>
                        
                        <button class="vote-btn ${userVote === 'down' ? 'active-down' : ''}" data-id="${report.id}" data-vote="down" title="Zgłoś nieobecność">
                            <span class="material-symbols-outlined icon-lg">thumb_down</span> 
                        </button>
                    </div>
                `;

                const customIcon = L.divIcon({
                    className: `map-marker ${fadeClass}`,
                    html: `<div style="background-color:${config.color}; width:100%; height:100%; border-radius:50%; display:flex; align-items:center; justify-content:center;">
                               <span class="material-symbols-outlined icon-md">${config.icon}</span>
                           </div>`,
                    iconSize: [44, 44],
                    iconAnchor: [22, 22],
                    popupAnchor: [0, -20]
                });

                if (leafletMarkers[report.id]) {
                    leafletMarkers[report.id].setPopupContent(popupHtml);
                    leafletMarkers[report.id].setIcon(customIcon);
                } else {
                    const marker = L.marker([report.lat, report.lng], { icon: customIcon })
                        .addTo(map)
                        .bindPopup(popupHtml);
                    leafletMarkers[report.id] = marker;
                }
            });
        }
    </script>
</body>
</html>
