<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <style>
        :root {
            --primary: #dc2626;         
            --primary-dark: #b91c1c;    
            --primary-light: #fee2e2;   
            --danger: #ef4444;          
            --success: #059669;
            --bg-solid: #f1f5f9;        
            --bg-panel: #ffffff;        
            --border-color: #cbd5e1;    
            --text-dark: #0f172a;       
            --text-muted: #64748b;      
            --radius-md: 12px;
        }

        * { box-sizing: border-box; touch-action: manipulation; margin: 0; padding: 0; }
        
        body, html {
            width: 100vw; height: 100dvh; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden; background-color: var(--bg-solid); 
            color: var(--text-dark);
        }

        .icon-sm { font-size: 18px !important; vertical-align: text-bottom; }
        .icon-md { font-size: 24px !important; vertical-align: middle; }
        .icon-lg { font-size: 28px !important; vertical-align: middle; }
        .icon-text-gap { display: inline-flex; align-items: center; gap: 6px; }

        /* EKRAN STARTOWY */
        #city-selector-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh;
            background: rgba(241, 245, 249, 0.95); backdrop-filter: blur(8px);
            z-index: 9999; display: flex; justify-content: center; align-items: center;
            padding: 20px; transition: opacity 0.3s ease;
        }
        .city-card {
            background: var(--bg-panel); width: 100%; max-width: 450px; border-radius: var(--radius-md);
            padding: 30px 24px; border: 2px solid var(--primary); box-shadow: 0 10px 25px rgba(220, 38, 38, 0.15);
            text-align: center;
        }
        .city-card h1 { font-size: 1.5rem; margin-bottom: 8px; display: flex; justify-content: center; align-items: center; gap: 8px; color: var(--primary); }
        .city-card p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 24px; }
        .city-list { display: flex; flex-direction: column; gap: 12px; }
        .city-btn {
            background: var(--bg-solid); border: 2px solid var(--border-color); color: var(--text-dark);
            padding: 16px; border-radius: var(--radius-md); font-size: 1rem; font-weight: 800;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            transition: all 0.2s;
        }
        .city-btn.active { border-color: var(--primary); background: var(--primary-light); color: var(--primary-dark); }

        /* MAPA */
        #map { position: absolute; top: 0; left: 0; width: 100vw; height: 100dvh; z-index: 1; background: #e2e8f0; }

        /* PANEL DOLNY */
        #ui-panel {
            position: absolute; bottom: 0; left: 0; width: 100vw; height: auto;
            background: var(--bg-panel); border-top: 3px solid var(--primary);
            z-index: 1000; display: flex; flex-direction: column;
            box-shadow: 0 -4px 25px rgba(0,0,0,0.08); padding-bottom: max(env(safe-area-inset-bottom), 12px);
        }

        .panel-header { padding: 14px 20px 8px 20px; display: flex; justify-content: space-between; align-items: center; }
        .panel-header h1 { font-size: 1.15rem; font-weight: 900; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        .panel-header .badge { background: var(--primary-light); color: var(--primary-dark); padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 800; }
        
        .btn-icon { background: none; border: none; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center; padding: 6px; border-radius: 50%; transition: 0.2s; }
        .btn-icon:hover, .btn-icon:active { color: var(--primary); background: var(--primary-light); }

        /* LIVE RADAR */
        #proximity-container {
            display: flex; flex-direction: column; gap: 6px;
            padding: 4px 16px 12px 16px; max-height: 120px; overflow-y: auto;
        }
        .proximity-title {
            font-size: 0.75rem; font-weight: 800; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; padding-left: 4px; display: flex; justify-content: space-between; align-items: center;
        }
        .proximity-title .badge-scan { background: #dbeafe; color: #1e3a8a; font-size: 0.65rem; padding: 2px 6px; border-radius: 10px; }
        
        .alert-card {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--bg-solid); padding: 12px 16px; border-radius: var(--radius-md);
            border-left: 4px solid var(--primary); cursor: pointer; transition: all 0.2s;
        }
        .alert-card:active { transform: scale(0.98); background: #e2e8f0; }
        .alert-card-left { display: flex; flex-direction: column; gap: 2px; }
        .alert-card-type { font-size: 0.95rem; font-weight: 900; color: var(--text-dark); display: flex; align-items: center; gap: 6px; }
        .alert-card-stop { font-size: 0.8rem; font-weight: 700; color: var(--text-muted); }
        .alert-card-distance {
            background: var(--primary-light); color: var(--primary-dark); border: 2px solid var(--primary);
            padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 900; white-space: nowrap; box-shadow: 0 4px 10px rgba(220, 38, 38, 0.2);
        }

        /* MODAL ZGŁOSZENIA */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh;
            background: rgba(15, 23, 42, 0.7); z-index: 2000; justify-content: center; align-items: flex-end; padding: 0;
        }
        .modal-content {
            background: var(--bg-panel); width: 100%; max-width: 500px; border-top: 4px solid var(--primary);
            padding: 24px; border-radius: 20px 20px 0 0;
        }
        .modal-title { font-size: 1.25rem; font-weight: 900; margin-bottom: 5px; color: var(--primary); text-align: center; }
        .modal-subtitle { font-size: 0.9rem; font-weight: 700; color: var(--text-muted); text-align: center; margin-bottom: 20px; }
        
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.8rem; font-weight: 800; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-group select {
            width: 100%; padding: 14px; border: 2px solid var(--border-color); border-radius: var(--radius-md);
            font-size: 1rem; background: var(--bg-panel); color: var(--text-dark); font-weight: 700;
        }
        .input-group select:focus { outline: none; border-color: var(--primary); background: var(--primary-light); }
        .input-group select:disabled { opacity: 0.5; background: var(--bg-solid); cursor: not-allowed; }
        
        .modal-buttons { display: flex; gap: 12px; margin-top: 24px; }
        .btn { flex: 1; padding: 14px; border-radius: var(--radius-md); font-weight: 800; border: none; cursor: pointer; font-size: 1rem; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; background: var(--border-color) !important; color: var(--text-muted) !important; }
        .btn-cancel { background: var(--bg-solid); color: var(--text-dark); border: 2px solid var(--border-color); }
        .btn-submit { background: var(--primary); color: white; border: 2px solid var(--primary-dark); }

        /* MARKERY I DYMKI */
        .map-marker {
            display: flex; align-items: center; justify-content: center; transition: all 0.3s;
            border-radius: 50%; color: white; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .map-marker.faded { opacity: 0.6; filter: grayscale(80%); }
        .map-marker.pulse { animation: pulseWarning 1.5s infinite; }
        @keyframes pulseWarning {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }

        .leaflet-popup-content-wrapper { background: var(--bg-panel); border-radius: var(--radius-md); padding: 0; overflow: hidden; border: 1px solid var(--border-color); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .leaflet-popup-content { margin: 0; min-width: 280px; }
        .leaflet-popup-tip { background: var(--bg-panel); border: 1px solid var(--border-color); border-top: none; border-left: none; }
        
        .popup-header { padding: 14px 16px; font-weight: 900; font-size: 16px; color: white; display: flex; align-items: center; gap: 6px; justify-content: space-between;}
        .popup-body { padding: 14px 16px; font-size: 14px; color: var(--text-dark); line-height: 1.6; font-weight: 600; }
        .popup-actions { display: flex; padding: 12px; gap: 12px; background: var(--bg-solid); border-top: 1px solid var(--border-color); justify-content: center; }
        
        .btn-report-popup { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: var(--radius-md); font-weight: 800; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
        
        .vote-btn {
            flex: 1; padding: 12px; border-radius: var(--radius-md); border: 2px solid var(--border-color);
            background: var(--bg-panel); color: var(--text-muted); cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 4px; transition: all 0.2s;
        }
        .vote-btn.active-up { background: #d1fae5; color: #047857; border-color: #10b981; }
        .vote-btn.active-down { background: var(--primary-light); color: var(--primary-dark); border-color: var(--primary); }

        /* TOAST */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--primary); color: white; padding: 14px 28px; border-radius: 30px; font-size: 0.95rem; font-weight: 800; border: 2px solid var(--primary-dark); box-shadow: 0 6px 20px rgba(220, 38, 38, 0.4); animation: toastEnter 0.2s forwards, toastLeave 0.2s forwards 3.5s; opacity: 0; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        @keyframes toastEnter { to { opacity: 1; transform: translateY(10px); } }
        @keyframes toastLeave { to { opacity: 0; transform: translateY(-10px); } }

        @media (min-width: 768px) {
            .modal-content { border-radius: var(--radius-md); margin-bottom: 50px; border: 2px solid var(--primary); }
            .modal-overlay { align-items: center; }
        }
    </style>
</head>

            if (isMuted) return;
            const audio = document.getElementById(audioId);
            if (audio) { audio.currentTime = 0; audio.play().catch(e => console.log("Zablokowano audio")); }

            const toast = document.createElement('div');

        }

        function getTimeAgo(timestamp) {
            const diffMs = Date.now() - timestamp;
            const diffMins = Math.floor(diffMs / 60000);
            if (diffMins < 1) return "przed chwilą";
            if (diffMins === 1) return "1 min. temu";
            return `${diffMins} min. temu`;
        }

        document.getElementById('btn-select-gorzow').addEventListener('click', () => {
            document.getElementById('city-selector-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('city-selector-overlay').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                initMap();
            }, 300);
        });

        function initMap() {
            map = L.map('map', { 
                zoomControl: false, maxBounds: ALLOWED_BOUNDS, maxBoundsViscosity: 1.0, minZoom: 12
            }).setView([52.7367, 15.2288], 13);
            
            L.control.zoom({ position: 'topright' }).addTo(map);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { 
                maxZoom: 19, attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            staticRoutesLayer = L.layerGroup().addTo(map);
            macroMarkersLayer = L.layerGroup().addTo(map);

            drawStaticRoutes();
            initStopMarkers();

            map.locate({ watch: true, enableHighAccuracy: true });
            map.on('locationfound', (e) => {
                userLatLng = e.latlng;
                if (!userMarker) {
                    userMarker = L.circleMarker(e.latlng, {
                        radius: 9, fillColor: '#3b82f6', color: '#ffffff', weight: 3, opacity: 1, fillOpacity: 0.9
                    }).addTo(map);
                } else {
                    userMarker.setLatLng(e.latlng);
                }
                renderNetworkState();
            });

            map.on('zoomend', renderNetworkState);

            try {
                const app = initializeApp(firebaseConfig);
                db = getDatabase(app);
                reportsRef = ref(db, 'reports');
                
                onValue(reportsRef, (snapshot) => {
                    reports = snapshot.val() || {};
                    renderNetworkState();
                });
                
                setInterval(renderNetworkState, 10000); 

            } catch (error) {
                showToast("wifi_off", "Brak połączenia", true);
            }
        }

        // Rysuje fizyczne, statyczne trasy (sieć)
        function drawStaticRoutes() {
            for (const [line, directions] of Object.entries(TRAM_ROUTES)) {
                for (const route of Object.values(directions)) {
                    const points = route.map(stop => STOPS_COORDS[stop]);
                    L.polyline(points, { color: '#94a3b8', weight: 4, opacity: 0.35, interactive: false }).addTo(staticRoutesLayer);
                }
            }
        }

        function initStopMarkers() {
            for (const [stopName, coords] of Object.entries(STOPS_COORDS)) {
                const icon = L.divIcon({
                    className: 'map-marker',
                    html: `<div style="background-color:#0f172a; width:100%; height:100%; border-radius:50%; border:2px solid white; display:flex; align-items:center; justify-content:center;">
                               <span class="material-symbols-outlined" style="font-size:16px;">tram</span>
                           </div>`,
                    iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -14]
                });

                const marker = L.marker(coords, { icon: icon });
                marker.on('click', () => { handleStopClick(stopName); });
                stopMarkers[stopName] = { marker: marker, defaultIcon: icon };
            }
        }

        function handleStopClick(stopName) {
            const activeReport = getActiveReportForStop(stopName);
            if (activeReport) {
                const html = generateReportPopupHtml(stopName, activeReport);
                stopMarkers[stopName].marker.bindPopup(html).openPopup();
            } else {
                openDefaultStopPopup(stopName);
            }
        }

        function openDefaultStopPopup(stopName) {
            let passingLines = [];
            for (const [line, directions] of Object.entries(TRAM_ROUTES)) {
                for (const route of Object.values(directions)) {
                    if (route.includes(stopName) && !passingLines.includes(line)) passingLines.push(line);
                }
            }

            const html = `
                <div class="popup-header" style="background-color: #0f172a;">
                    <span class="icon-text-gap"><span class="material-symbols-outlined icon-sm">tram</span> ${stopName}</span>
                </div>
                <div class="popup-body">
                    <p style="margin-bottom:10px; color:var(--text-muted);">Linie: <strong>${passingLines.join(', ')}</strong></p>
                    <p style="font-size: 12px; color: var(--success);"><span class="material-symbols-outlined icon-sm">check_circle</span> Brak zgłoszonych utrudnień.</p>
                </div>
                <div class="popup-actions">
                    <button class="btn-report-popup btn-start-report" data-stop="${stopName.replace(/"/g, '&quot;')}">
                        <span class="material-symbols-outlined icon-md">add_alert</span> Zgłoś utrudnienie
                    </button>
                </div>
            `;
            stopMarkers[stopName].marker.bindPopup(html).openPopup();
        }

        // Generator HTML dla dymków informacji (uniwersalny)
        function generateReportPopupHtml(displayStopName, itemData) {
            const r = itemData.report; 
            const config = EVENT_CONFIG[r.type];
            const confirmsCount = r.confirms || 0;
            const deniesCount = r.denies || 0;
            const userVote = localStorage.getItem(`vote_${r.id}`);

            return `
                <div class="popup-header" style="background-color: ${config.color}">
                    <span class="icon-text-gap"><span class="material-symbols-outlined icon-sm">${config.icon}</span> ${config.label} (L${r.line})</span>
                </div>
                <div class="popup-body">
                    <div style="font-size:16px; font-weight:800; margin-bottom:8px;">Przystanek: ${displayStopName}</div>
                    <div class="icon-text-gap" style="margin-bottom: 8px;">
                        <span class="material-symbols-outlined icon-sm">signpost</span> Kierunek: ${r.direction}
                    </div>
                    <div style="font-size: 12px; color: var(--text-muted); display:flex; justify-content: space-between;">
                        <span>Dodano: ${getTimeAgo(r.createdAt)}</span>
                        <span>Akt: ${getTimeAgo(r.lastActivity)}</span>
                    </div>
                    <div style="display: flex; gap: 16px; margin-top: 12px; justify-content: center;">
                        <span class="icon-text-gap" style="color: var(--success); font-weight: 800;"><span class="material-symbols-outlined icon-sm">thumb_up</span> ${confirmsCount}</span>
                        <span class="icon-text-gap" style="color: var(--danger); font-weight: 800;"><span class="material-symbols-outlined icon-sm">thumb_down</span> ${deniesCount}/3</span>
                    </div>
                </div>
                <div class="popup-actions">
                    <button class="vote-btn ${userVote === 'up' ? 'active-up' : ''}" data-id="${r.id}" data-vote="up" title="Potwierdzam">
                        <span class="material-symbols-outlined icon-lg">thumb_up</span>
                    </button>
                    <button class="vote-btn ${userVote === 'down' ? 'active-down' : ''}" data-id="${r.id}" data-vote="down" title="Odwołaj">
                        <span class="material-symbols-outlined icon-lg">thumb_down</span> 
                    </button>
                </div>
            `;
        }

        function getProcessedEvents() {
            const now = Date.now();
            const activeEvents = [];

            for (const report of Object.values(reports)) {
                const ageMs = now - report.createdAt;
                const inactiveMs = now - report.lastActivity;
                
                if (ageMs > DELETE_THRESHOLD_MS || inactiveMs > KANAR_INACTIVE_DEATH) continue; 

                const route = TRAM_ROUTES[report.line]?.[report.direction];
                if(!route) continue;

                const startIndex = route.indexOf(report.startStop);
                if(startIndex === -1) continue;

                let currentIndex = startIndex;
                if(report.type === 'kanar') {
                    const shifted = Math.floor(ageMs / KANAR_SHIFT_MS);
                    currentIndex = Math.min(startIndex + shifted, route.length - 1);
                }

                activeEvents.push({ report: report, currentStop: route[currentIndex], route: route, currentIndex: currentIndex });
            }
            return activeEvents;
        }

        function getActiveReportForStop(stopName) {
            const activeList = getProcessedEvents();
            for (const item of activeList) {
                const maxEnd = Math.min(item.currentIndex + 5, item.route.length);
                const stopIndex = item.route.indexOf(stopName);
                if (stopIndex >= item.currentIndex && stopIndex < maxEnd) return item;
            }
            return null;
        }

        // GŁÓWNA FUNKCJA RENDERUJĄCA SADA
        function renderNetworkState() {
            const currentZoom = map.getZoom();
            const showAllStops = currentZoom >= 14; 
            const activeList = getProcessedEvents();

            // 1. Obsługa podglądu przystanków zaleznie od Zoomu
            for (const [stopName, obj] of Object.entries(stopMarkers)) {
                obj.marker.setIcon(obj.defaultIcon);
                if (showAllStops) {
                    if (!map.hasLayer(obj.marker)) obj.marker.addTo(map);
                } else {
                    if (map.hasLayer(obj.marker)) map.removeLayer(obj.marker);
                }
            }
            
            // Czyszczenie czerwonych tras i starych makro-markerów
            activePolylines.forEach(pl => map.removeLayer(pl));
            activePolylines = [];
            
            const activeIds = new Set(activeList.map(i => i.report.id));
            for (const id in macroMarkers) {
                if (!activeIds.has(id) || showAllStops) {
                    macroMarkersLayer.removeLayer(macroMarkers[id]);
                    delete macroMarkers[id];
                }
            }

            // 2. Renderowanie Aktywnych Zagrożeń (LOD i Normalny tryb)
            activeList.forEach(item => {
                const config = EVENT_CONFIG[item.report.type];
                const isFaded = (Date.now() - item.report.createdAt) > FADE_THRESHOLD_MS;
                const pulseClass = (item.report.type === 'kanar' && !isFaded) ? 'pulse' : '';
                
                if (showAllStops) {
                    // Tryb bliski (Detale: Czerwona trasa + ikony alertów na stacjach)
                    const alertIcon = L.divIcon({
                        className: `map-marker ${isFaded ? 'faded' : ''} ${pulseClass}`,
                        html: `<div style="background-color:${config.color}; width:100%; height:100%; border-radius:50%; display:flex; align-items:center; justify-content:center;">
                                   <span class="material-symbols-outlined icon-md">${config.icon}</span>
                               </div>`,
                        iconSize: [44, 44], iconAnchor: [22, 22], popupAnchor: [0, -20]
                    });

                    const maxEnd = Math.min(item.currentIndex + 5, item.route.length);
                    const polylinePoints = [];

                    for (let i = item.currentIndex; i < maxEnd; i++) {
                        const affectedStop = item.route[i];
                        polylinePoints.push(STOPS_COORDS[affectedStop]);
                        
                        if (stopMarkers[affectedStop]) {
                            if (!map.hasLayer(stopMarkers[affectedStop].marker)) stopMarkers[affectedStop].marker.addTo(map);
                            stopMarkers[affectedStop].marker.setIcon(alertIcon);
                            if (stopMarkers[affectedStop].marker.isPopupOpen()) {
                                stopMarkers[affectedStop].marker.getPopup().setContent(generateReportPopupHtml(affectedStop, item));
                            }
                        }
                    }

                    if (polylinePoints.length > 1) {
                        const polyline = L.polyline(polylinePoints, { color: config.color, weight: 6, opacity: 0.7, dashArray: '10, 10', lineJoin: 'round' }).addTo(map);
                        activePolylines.push(polyline);
                    }
                } else {
                    // Tryb oddalony (LOD) - 1 Ogromny Makro Znacznik w punkcie aktualnym
                    const macroIcon = L.divIcon({
                        className: `map-marker ${isFaded ? 'faded' : ''} ${pulseClass}`,
                        html: `<div style="background-color:${config.color}; width:100%; height:100%; border-radius:50%; display:flex; align-items:center; justify-content:center; border: 4px solid white; box-shadow: 0 6px 15px rgba(0,0,0,0.5);">
                                   <span class="material-symbols-outlined icon-lg">${config.icon}</span>
                               </div>`,
                        iconSize: [64, 64], iconAnchor: [32, 32], popupAnchor: [0, -32]
                    });

                    const coords = STOPS_COORDS[item.currentStop];
                    const rId = item.report.id;
                    const html = generateReportPopupHtml(item.currentStop, item);

                    if (!macroMarkers[rId]) {
                        macroMarkers[rId] = L.marker(coords, { icon: macroIcon }).addTo(macroMarkersLayer);
                    } else {
                        macroMarkers[rId].setLatLng(coords);
                        macroMarkers[rId].setIcon(macroIcon);
                    }
                    
                    if (macroMarkers[rId].getPopup()) {
                        macroMarkers[rId].getPopup().setContent(html);
                    } else {
                        macroMarkers[rId].bindPopup(html);
                    }
                }
            });

            // 3. Budowanie panelu Live Feed (Odległości GPS)
            renderProximityFeed(activeList);
        }

        // FEED PROXIMITY: Pokazuje MAX 1 zdarzenie, do którego się aktualnie zbliżasz i jest w obrębie 500m
        function renderProximityFeed(activeList) {
            const container = document.getElementById('proximity-container');
            
            if (!userLatLng) {
                container.innerHTML = `<div style="text-align:center; color:var(--text-muted); font-size:0.85rem; padding:8px;">Oczekiwanie na sygnał GPS pasażera...</div>`;
                return;
            }

            if (activeList.length === 0) {
                container.innerHTML = `<div style="text-align:center; color:var(--success); font-size:0.9rem; font-weight:800; padding:12px 0;"><span class="material-symbols-outlined icon-sm">check_circle</span> Czysto. Brak zgłoszonych utrudnień.</div>`;
                return;
            }

            // Przeliczenie odległości
            const feedData = activeList.map(item => {
                return { ...item, distance: userLatLng.distanceTo(L.latLng(STOPS_COORDS[item.currentStop])) };
            });

            // Sortowanie od najbliższego
            feedData.sort((a, b) => a.distance - b.distance);

            let targetEvent = null;

            for (const item of feedData) {
                if (item.distance <= 500) {
                    let prevDist = eventDistancesHistory[item.report.id];
                    // Czy się zbliżamy (lub stoimy w miejscu)? Dajemy 15 metrów marginesu błędu GPS
                    let isApproaching = (prevDist === undefined) || (item.distance <= prevDist + 15);
                    
                    if (isApproaching) {
                        targetEvent = item;
                        break; // Bierzemy pierwsze, najbliższe, do którego się zbliżamy
                    }
                }
            }

            // Zapis historii do przyszłej klatki dla wszystkich
            eventDistancesHistory = {};
            feedData.forEach(item => { eventDistancesHistory[item.report.id] = item.distance; });

            if (!targetEvent) {
                container.innerHTML = `<div style="text-align:center; color:var(--text-muted); font-size:0.85rem; font-weight:700; padding:12px 0;"><span class="material-symbols-outlined icon-sm">explore</span> Skanowanie... Brak zagrożeń w strefie 500m.</div>`;
                return;
            }

            // Renderowanie karty celu
            const config = EVENT_CONFIG[targetEvent.report.type];
            const distStr = `${Math.round(targetEvent.distance)}m`;
            
            container.innerHTML = '';
            const card = document.createElement('div');
            card.className = 'alert-card';
            card.style.borderLeftColor = config.color;
            
            card.innerHTML = `
                <div class="alert-card-left">
                    <div class="alert-card-type">
                        <span class="material-symbols-outlined icon-sm" style="color:${config.color}">${config.icon}</span>
                        ${config.label} (Linia ${targetEvent.report.line})
                    </div>
                    <div class="alert-card-stop">Zbliżasz się! Przystanek: ${targetEvent.currentStop}</div>
                </div>
                <div class="alert-card-distance" style="background-color:${config.color}20; color:${config.color}">
                    <span class="material-symbols-outlined icon-sm" style="font-size:14px!important;">warning</span> ${distStr}
                </div>
            `;

            card.addEventListener('click', () => {
                const coords = STOPS_COORDS[targetEvent.currentStop];
                map.flyTo([coords[0] - 0.003, coords[1]], 15, { animate: true, duration: 1.2 });
                setTimeout(() => {
                    if(!map.hasLayer(stopMarkers[targetEvent.currentStop].marker)) stopMarkers[targetEvent.currentStop].marker.addTo(map);
                    stopMarkers[targetEvent.currentStop].marker.openPopup();
                }, 1300);
            });

            container.appendChild(card);
        }


        // --- FORMULARZ ZGŁOSZEŃ ---
        const modal = document.getElementById('modalOverlay');
        const inputLine = document.getElementById('event-line');
        const inputDir = document.getElementById('event-direction');
        const btnSubmit = document.getElementById('btn-submit');

        function startReportForm(stopName) {
            selectedStopForReport = stopName;
            document.getElementById('modal-stop-name').textContent = stopName;
            
            inputLine.innerHTML = '<option value="" disabled selected>Wybierz linię...</option>';
            inputDir.innerHTML = '<option value="" disabled selected>Najpierw wybierz linię...</option>';
            inputDir.disabled = true;
            btnSubmit.disabled = true;

            let availableLines = [];
            for (const [line, directions] of Object.entries(TRAM_ROUTES)) {
                let stopExistsOnLine = false;
                for (const route of Object.values(directions)) {
                    if (route.includes(stopName)) stopExistsOnLine = true;
                }
                if(stopExistsOnLine) availableLines.push(line);
            }

            availableLines.sort((a,b) => parseInt(a)-parseInt(b)).forEach(line => {
                let opt = document.createElement('option');
                opt.value = line; opt.textContent = `Linia ${line}`;
                inputLine.appendChild(opt);
            });

            stopMarkers[stopName].marker.closePopup();
            modal.style.display = 'flex';
        }

        inputLine.addEventListener('change', () => {
            const line = inputLine.value;
            inputDir.innerHTML = '<option value="" disabled selected>Wybierz kierunek...</option>';
            
            if (line && TRAM_ROUTES[line]) {
                inputDir.disabled = false;
                for (const [dirName, routeArray] of Object.entries(TRAM_ROUTES[line])) {
                    const stopIndex = routeArray.indexOf(selectedStopForReport);
                    if (stopIndex !== -1 && stopIndex < routeArray.length - 1) {
                        let opt = document.createElement('option');
                        opt.value = dirName; opt.textContent = `Kierunek: ${dirName}`;
                        inputDir.appendChild(opt);
                    }
                }
            } else {
                inputDir.disabled = true;
            }
            validateForm();
        });

        inputDir.addEventListener('change', validateForm);
        function validateForm() { btnSubmit.disabled = !(inputLine.value && inputDir.value); }

        document.getElementById('btn-cancel').addEventListener('click', () => {
            modal.style.display = 'none'; selectedStopForReport = null;
        });

        btnSubmit.addEventListener('click', () => {
            if (!selectedStopForReport || !inputLine.value || !inputDir.value) return;

            const type = document.getElementById('event-type').value;
            const now = Date.now();

            btnSubmit.disabled = true;
            btnSubmit.textContent = "Wysyłanie...";

            const newRef = push(reportsRef);
            set(newRef, {
                id: newRef.key,
                type: type,
                line: inputLine.value,
                direction: inputDir.value,
                startStop: selectedStopForReport,
                createdAt: now,
                lastActivity: now,
                confirms: 1, denies: 0
            }).then(() => {
                localStorage.setItem(`vote_${newRef.key}`, 'up');
                modal.style.display = 'none';
                showToast("done", "Zgłoszono pomyślnie");
                playSound('sound-notify');
                
                const coords = STOPS_COORDS[selectedStopForReport];
                if(coords) map.flyTo([coords[0] - 0.005, coords[1]], 15);
            }).catch(() => {
                showToast("error", "Błąd połączenia", true);
            }).finally(() => {
                btnSubmit.textContent = "Wyślij";
            });
        });

        // --- GLOBALNA DELEGACJA ZGŁOSZEŃ I GŁOSÓW ---
        let isVoting = false;
        document.addEventListener('click', (e) => {
            const btnReport = e.target.closest('.btn-start-report');
            if (btnReport) {
                startReportForm(btnReport.dataset.stop);
                return;
            }

            const btnVote = e.target.closest('.vote-btn');
            if (!btnVote || isVoting) return;
            
            const id = btnVote.dataset.id;
            const voteType = btnVote.dataset.vote;
            const report = reports[id];
            if (!report) return;

            isVoting = true;
            const storageKey = `vote_${id}`;
            const previousVote = localStorage.getItem(storageKey);

            let newConfirms = report.confirms || 0;
            let newDenies = report.denies || 0;
            
            if (previousVote === voteType) {
                if (voteType === 'up') newConfirms--;
                if (voteType === 'down') newDenies--;
                localStorage.removeItem(storageKey);
            } else {
                if (previousVote === 'up') newConfirms--;
                if (previousVote === 'down') newDenies--;
                
                if (voteType === 'up') newConfirms++;
                if (voteType === 'down') newDenies++;
                localStorage.setItem(storageKey, voteType);
            }

            if (newDenies >= 3) {
                remove(ref(db, `reports/${id}`)).then(() => {
                    localStorage.removeItem(storageKey);
                    showToast("delete", "Usunięto utrudnienie (społeczność)");
                    playSound('sound-cancel');
                    map.closePopup(); 
                }).finally(() => { isVoting = false; });
            } else {
                update(ref(db, `reports/${id}`), { confirms: newConfirms, denies: newDenies, lastActivity: Date.now() })
                .then(() => {
                    if (previousVote !== voteType) {
                        showToast("update", "Twój głos został zapisany");
                        if (voteType === 'up') playSound('sound-confirm');
                        else if (voteType === 'down') playSound('sound-cancel');
                    }
                }).finally(() => { isVoting = false; });
            }
        });

    </script>
</body>
</html>
