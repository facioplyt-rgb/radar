<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK Radar Gorzów - Wersja Mobilna</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --primary: #1e3a8a;
            --accent: #ef4444;
            --bg-dark: #0f172a;
            --text-main: #334155;
            --panel-bg: rgba(255, 255, 255, 0.95);
        }

        /* Twardy reset dla urządzeń mobilnych */
        * { box-sizing: border-box; touch-action: manipulation; }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            /* Używamy dvh (dynamic viewport height), aby paski adresu nie psuły layoutu */
            height: 100dvh; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            background-color: #e2e8f0;
        }

        /* Mapa zajmuje absolutnie cały ekran z tyłu */
        #map {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1;
        }

        /* Panel UI - Na start jako dolny panel na telefonach (Bottom Sheet) */
        #ui-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40dvh;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .brand {
            padding: 16px 20px;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
        }

        .brand h1 { margin: 0; font-size: 1.2rem; font-weight: 800; }
        .brand span { background: #3b82f6; padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; }

        .instructions {
            padding: 10px 20px;
            background: #eff6ff;
            font-size: 0.8rem;
            color: #1e40af;
            border-bottom: 1px solid #dbeafe;
            text-align: center;
        }

        #events-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            -webkit-overflow-scrolling: touch; /* Płynne przewijanie na iOS */
        }

        .empty-state { text-align: center; color: #64748b; font-size: 0.9rem; margin-top: 20px; padding: 0 20px; }

        .event-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* Niestandardowe ikony mapy */
        .custom-marker {
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 3px solid white; color: white; font-size: 18px;
        }

        /* Dymek (Popup) dostosowany pod gruby palec */
        .popup-box { min-width: 220px; font-family: inherit; }
        .popup-header { font-weight: bold; font-size: 15px; margin-bottom: 8px; }
        .popup-details { font-size: 13px; color: #475569; margin-bottom: 12px; line-height: 1.5; }
        .voting-container { display: flex; justify-content: space-between; gap: 10px; border-top: 1px solid #e2e8f0; padding-top: 10px; }
        
        .vote-btn {
            flex: 1; padding: 10px 5px; border: none; border-radius: 8px;
            font-weight: bold; font-size: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 4px;
            background-color: #f1f5f9; color: #1e293b; transition: 0.2s;
        }
        .vote-btn.active-up { background-color: #22c55e !important; color: white !important; }
        .vote-btn.active-down { background-color: #ef4444 !important; color: white !important; }

        /* Modal pod Mobile */
        .modal {
            display: none; position: fixed; z-index: 3000;
            left: 0; top: 0; width: 100vw; height: 100dvh;
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px);
            justify-content: center; align-items: center; padding: 20px;
        }
        
        .modal-content {
            background: white; width: 100%; max-width: 400px;
            border-radius: 20px; padding: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
        }
        
        .modal-content h2 { margin-top: 0; font-size: 1.3rem; margin-bottom: 20px; text-align: center; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 13px; color: #475569; }
        
        /* Ważne: font-size 16px zapobiega auto-zoomowi w iOS Safari */
        .form-group input, .form-group select {
            width: 100%; padding: 14px; border: 1px solid #cbd5e1;
            border-radius: 10px; font-size: 16px; background: #f8fafc;
        }
        
        .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
        .modal-actions button {
            flex: 1; padding: 14px; border-radius: 10px; font-weight: bold; font-size: 15px; border: none; cursor: pointer;
        }
        .btn-close-modal { background: #e2e8f0; color: #475569; }
        .btn-confirm-add { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(30,58,138,0.3); }

        /* Media Query dla większych ekranów (Komputery/Tablety) */
        @media (min-width: 768px) {
            #ui-panel {
                top: 0; bottom: 0; left: 0; width: 380px; height: 100dvh;
                border-radius: 0; box-shadow: 4px 0 25px rgba(0,0,0,0.1);
            }
            .brand { border-radius: 0; }
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="ui-panel">
        <div class="brand">
            <h1>🚌 MZK Radar</h1>
            <span>Gorzów</span>
        </div>
        <div class="instructions">
            📍 Kliknij palcem na mapie, by zgłosić zdarzenie
        </div>
        <div id="events-list"></div>
    </div>

    <div id="addEventModal" class="modal">
        <div class="modal-content">
            <h2>📢 Nowe zgłoszenie</h2>
            <div class="form-group">
                <label>Rodzaj zdarzenia</label>
                <select id="form-type">
                    <option value="kanar">🎫 Kontrola biletów (Kanar)</option>
                    <option value="awaria">🛠️ Awaria pojazdu</option>
                    <option value="opoznienie">⏳ Duże opóźnienie</option>
                    <option value="inne">⚠️ Inne utrudnienie</option>
                </select>
            </div>
            <div class="form-group">
                <label>Numer linii (np. 104, 126, T2)</label>
                <input type="text" id="form-line" placeholder="Wpisz linię" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Lokalizacja / Przystanek</label>
                <input type="text" id="form-location" placeholder="np. Kłodawa Szkoła" autocomplete="off">
            </div>
            <div class="modal-actions">
                <button class="btn-close-modal" onclick="closeModal(event)">Anuluj</button>
                <button class="btn-confirm-add" onclick="submitNewEvent(event)">Dodaj na mapę</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBDA0kFNmO3O0L57M1V7x4FFImpS8IpNC0",
            authDomain: "radar-585fa.firebaseapp.com",
            projectId: "radar-585fa",
            storageBucket: "radar-585fa.firebasestorage.app",
            messagingSenderId: "273151127719",
            appId: "1:273151127719:web:0f4477fafe77248e312b82"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const reportsRef = ref(db, 'reports');

        // Ustawienia mapy dostosowane pod urządzenia mobilne (zoomControl na false przesuniemy domyślne przyciski +/-)
        const map = L.map('map', { zoomControl: false }).setView([52.7367, 15.2288], 13);
        L.control.zoom({ position: 'topright' }).addTo(map); // Przyciski zooma u góry po prawej, by panel dolny ich nie zasłaniał

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OSM | MZK Radar'
        }).addTo(map);

        let clickedLat = null;
        let clickedLng = null;
        let reports = {}; 
        let leafletMarkers = {};

        const eventConfig = {
            kanar: { label: '🎫 Kanar', color: '#ef4444' },
            awaria: { label: '🛠️ Awaria', color: '#7f1d1d' },
            opoznienie: { label: '⏳ Opóźnienie', color: '#f59e0b' },
            inne: { label: '⚠️ Inne', color: '#3b82f6' }
        };

        map.on('click', function(e) {
            clickedLat = e.latlng.lat;
            clickedLng = e.latlng.lng;
            openModal();
        });

        window.openModal = function() {
            document.getElementById('addEventModal').style.display = 'flex';
            document.getElementById('form-line').value = '';
            document.getElementById('form-location').value = '';
        }

        window.closeModal = function(event) {
            if(event) event.stopPropagation();
            document.getElementById('addEventModal').style.display = 'none';
        }

        window.submitNewEvent = function(event) {
            if(event) event.stopPropagation();

            const type = document.getElementById('form-type').value;
            const line = document.getElementById('form-line').value || 'Brak';
            const location = document.getElementById('form-location').value || 'Nieznana';
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            const newReportRef = push(reportsRef);
            const reportId = newReportRef.key;

            const newReport = {
                id: reportId, lat: clickedLat, lng: clickedLng,
                type: type, line: line, location: location,
                confirms: 1, denies: 0, time: time
            };

            set(newReportRef, newReport).then(() => {
                localStorage.setItem(`vote_${reportId}`, 'up');
                closeModal();
                // Na urządzeniach mobilnych offsetujemy centrum, by dolny panel nie zasłaniał nowej pinezki
                map.panTo([clickedLat - 0.005, clickedLng]); 
            });
        }

        window.vote = function(event, id, voteType) {
            if (event) {
                event.stopPropagation();
                event.preventDefault(); // Zabezpieczenie przed "ghost clicks" na telefonach
            }

            const report = reports[id];
            if (!report) return;

            const storageKey = `vote_${id}`;
            const previousVote = localStorage.getItem(storageKey);

            let newConfirms = report.confirms || 0;
            let newDenies = report.denies || 0;

            if (previousVote === voteType) {
                if (voteType === 'up') newConfirms--;
                if (voteType === 'down') newDenies--;
                localStorage.removeItem(storageKey);
            } else {
                if (previousVote === 'up') newConfirms--;
                if (previousVote === 'down') newDenies--;
                if (voteType === 'up') newConfirms++;
                if (voteType === 'down') newDenies++;
                localStorage.setItem(storageKey, voteType);
            }

            if (newDenies - newConfirms >= 3) {
                remove(ref(db, `reports/${id}`));
                localStorage.removeItem(storageKey);
            } else {
                update(ref(db, `reports/${id}`), { confirms: newConfirms, denies: newDenies });
            }
        }

        window.focusOnReport = function(id) {
            const report = reports[id];
            if(report) {
                // Lekki offset w dół, by dymek idealnie wyśrodkował się nad dolnym panelem na telefonie
                map.setView([report.lat - 0.005, report.lng], 15);
                if (leafletMarkers[id]) leafletMarkers[id].openPopup();
            }
        }

        onValue(reportsRef, (snapshot) => {
            reports = snapshot.val() || {}; 
            renderAll();
        });

        function renderAll() {
            const listContainer = document.getElementById('events-list');
            listContainer.innerHTML = '';

            for (let id in leafletMarkers) {
                if (!reports[id]) {
                    map.removeLayer(leafletMarkers[id]);
                    delete leafletMarkers[id];
                }
            }

            const reportsArray = Object.values(reports);
            if (reportsArray.length === 0) {
                listContainer.innerHTML = '<div class="empty-state">Brak utrudnień na drodze.<br>Kliknij na mapę, by zgłosić.</div>';
                return;
            }

            reportsArray.sort((a,b) => ((b.confirms || 0) - (b.denies || 0)) - ((a.confirms || 0) - (a.denies || 0)));

            reportsArray.forEach(report => {
                const config = eventConfig[report.type];
                const score = (report.confirms || 0) - (report.denies || 0);
                const userVote = localStorage.getItem(`vote_${report.id}`);

                const card = document.createElement('div');
                card.className = 'event-card';
                card.onclick = () => focusOnReport(report.id);
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
                        <span style="font-weight:bold; color:${config.color}">${config.label} (Linia ${report.line})</span>
                        <span style="font-size:12px; color:#64748b; font-weight:bold;">🕒 ${report.time}</span>
                    </div>
                    <div style="font-size:13px; color:#475569; margin-bottom:6px;">📍 ${report.location}</div>
                    <div style="font-size:12px; font-weight:bold; color: ${score >= 0 ? '#16a34a' : '#dc2626'}">
                        Wiarygodność: ${score} pkt (${report.confirms || 0} 👍)
                    </div>
                `;
                listContainer.appendChild(card);

                const activeUpClass = userVote === 'up' ? 'active-up' : '';
                const activeDownClass = userVote === 'down' ? 'active-down' : '';

                const popupHtml = `
                    <div class="popup-box">
                        <div class="popup-header" style="color: ${config.color}">${config.label} - Linia ${report.line}</div>
                        <div class="popup-details">
                            <strong>Gdzie:</strong> ${report.location}<br>
                            <strong>Kiedy:</strong> ${report.time}<br>
                        </div>
                        <div class="voting-container">
                            <button type="button" class="vote-btn ${activeUpClass}" onmousedown="vote(event, '${report.id}', 'up')" ontouchstart="vote(event, '${report.id}', 'up')">👍 Prawda</button>
                            <button type="button" class="vote-btn ${activeDownClass}" onmousedown="vote(event, '${report.id}', 'down')" ontouchstart="vote(event, '${report.id}', 'down')">👎 Fałsz</button>
                        </div>
                    </div>
                `;

                const customIcon = L.divIcon({
                    className: 'custom-marker',
                    html: `<div style="background-color:${config.color}; width:100%; height:100%; border-radius:50%; display:flex; align-items:center; justify-content:center;">${config.label.split(' ')[0]}</div>`,
                    iconSize: [40, 40],
                    iconAnchor: [20, 20],
                    popupAnchor: [0, -20]
                });

                if (leafletMarkers[report.id]) {
                    leafletMarkers[report.id].setPopupContent(popupHtml);
                } else {
                    const marker = L.marker([report.lat, report.lng], { icon: customIcon })
                        .addTo(map)
                        .bindPopup(popupHtml);
                    leafletMarkers[report.id] = marker;
                }
            });
        }
    </script>
</body>
</html>
